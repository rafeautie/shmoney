name: Bug report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! **Never attach your database file, bank exports, or SimpleFIN credentials.** If you suspect a security vulnerability, use [private vulnerability reporting](https://github.com/rafeautie/shmoney/security/advisories/new) instead.

        shmoney's log files contain no transaction, account, or balance data; you can verify this yourself via Settings → About → Report bug → Open logs folder.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## Diagnostics (optional)

        Logs help a lot, but they're never required. Two ways to share them, whichever you prefer:

        - **Paste:** click **Report bug** in Settings → About, then **Copy diagnostics**, and paste into the box below.
        - **Attach the file:** in Settings → About → Report bug, use **Open logs folder** and drag the newest log file into the upload box below.

        Either way, review what you're sharing before you submit; it came from your machine.
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics (Paste)
      render: text
  - type: upload
    id: log-file
    attributes:
      label: Log File
      description: Drag the newest log file here (Settings → About → Report bug → Open logs folder).
