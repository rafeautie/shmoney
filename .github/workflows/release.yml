name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # electron-builder races when parallel jobs each look for the draft release
  # and create their own; pre-creating it gives all platforms one draft to
  # upload into
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft --verify-tag --title "$GITHUB_REF_NAME"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: macos-latest
            args: --mac
          - os: ubuntu-latest
            args: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall runs `electron-builder install-app-deps`, rebuilding
      # better-sqlite3 / node-llama-cpp against the packaged Electron
      - run: npm ci

      # latest.yml takes its version from package.json, not the tag; a mismatch
      # would publish a release that updaters resolve to the wrong version
      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm run build

      # uploads platform artifacts and update metadata to a shared draft release;
      # publishing the draft in the GitHub UI is the final release gate
      - name: Package and publish
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # no signing certificate in CI; skip keychain identity lookup on macOS
          CSC_IDENTITY_AUTO_DISCOVERY: false
